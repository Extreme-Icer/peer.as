# 定期重建并部署 BGP Insights（纯静态、可复现）。
#
# 这是**开源/可复现版**流水线：用 RIR delegated-extended（国家级、完全开放）作为地理库，
# 任何 fork 都能跑出一份合法可镜像的 dist —— 不需要私有 ipdb。
# 官方部署若要**城市级**精度，请用私有 ipdb 在本机/自托管 runner 跑（geo_provider=ipdb）。
#
# 需要的 Secrets（仅部署步骤用；不部署可删该步）：
#   CLOUDFLARE_API_TOKEN  —— 有 Pages:Edit 权限
#   CLOUDFLARE_ACCOUNT_ID
#
# 注意：全球 v4 全表 ingest 会下载 ~400MB MRT、生成 ~3GB SQLite、~47M 路径行。
# GitHub 托管 runner(7GB RAM/14GB 盘) 偏紧，已用 IPC_DUCKDB_MEM 降内存并依赖磁盘溢出；
# 如失败，建议自托管 runner 或更大机器。
name: build-and-deploy
on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 4 * * 1"   # 每周一 04:17 UTC

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -U pip
          ./.venv/bin/pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend (Vite + Svelte)
        working-directory: ipcollect/web
        run: |
          npm ci
          npm run build

      - name: Import geo (RIR, country-level, open)
        run: ./ipc geo-import --provider rir

      - name: Ingest global v4 RIB
        run: ./ipc ingest --reset --scope global

      - name: Export Parquet + SSG
        env:
          IPC_DUCKDB_MEM: "5GB"
        run: ./ipc export-parquet --out dist

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name bgp-insights --branch main --commit-dirty=true

      - name: Upload artifact (when not deploying)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
